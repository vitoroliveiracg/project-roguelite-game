<div id="main-menu-container">
    
    <!-- TELA DE LOADING (OVERLAY) -->
    <div id="loading-screen-container">
        <div class="loading-center">
            <img id="loading-sprite" src="" alt="Loading...">
            <h2 id="loading-funny-text">Acordando os NPCs...</h2>
        </div>
        <div id="loading-tech-log">Aguardando a inicialização da engine...</div>
    </div>

    <!-- ABA 1: PROGRESSÃO (ÁRVORE) -->
    <div class="mm-tab-content" id="mm-tab-1">
        <div class="tier-line" style="top: 25%;"></div>
        <div class="tier-line" style="top: 50%;"></div>
        <div class="tier-line" style="top: 75%;"></div>
        <div style="position: absolute; top: 20%; left: 5%; font-size: 40px;">3</div>

        <!-- Caminhos SVG desenhados à mão -->
        <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">
            <path d="M 500 200 Q 550 350, 520 400 T 560 550 T 480 650" fill="none" stroke="#fff" stroke-width="6"/>
            <path d="M 500 200 Q 400 300, 300 450" fill="none" stroke="#888" stroke-width="3" stroke-dasharray="10,10"/>
            <path d="M 550 200 Q 650 250, 750 300" fill="none" stroke="#888" stroke-width="3" stroke-dasharray="10,10"/>
        </svg>

        <!-- Nó Principal Superior -->
        <div class="node-circle" style="top: 150px; left: 450px; width: 100px; height: 100px;">
            <div class="node-triangle"></div>
            <div class="node-text" style="right: -70px;">✓ 500</div>
        </div>

        <!-- Nó Central (Spark) -->
        <div style="position: absolute; top: 400px; left: 520px; font-size: 40px; z-index: 10; text-shadow: 0 0 5px #000;">
            ✨ <span class="node-text" style="right: -50px; top: 10px;">✓ 25</span>
        </div>

        <!-- Nó Inferior (Moeda) -->
        <div class="node-circle coin-edge" style="top: 600px; left: 450px; width: 80px; height: 80px;">
            <span style="font-size: 40px;">🌹</span>
            <div class="node-text" style="right: -40px;">✓</div>
            <div style="position: absolute; bottom: -20px; border-bottom: 4px solid #555; border-radius: 50%; width: 60px; height: 10px;"></div>
        </div>

        <!-- Nós Secundários -->
        <div class="node-circle double-circle" style="top: 400px; left: 260px; width: 60px; height: 60px;">
            <span style="font-size: 30px;">✡</span>
            <div class="node-text" style="right: -50px; top: -20px;">202</div>
        </div>
        <div style="position: absolute; top: 500px; left: 360px; font-size: 30px; transform: rotate(-45deg);">🌙</div>
        <div class="node-circle" style="top: 150px; left: 650px; width: 50px; height: 50px;"></div>
        <div class="node-circle double-circle" style="top: 280px; left: 720px; width: 60px; height: 60px;"></div>

        <div class="node-text" style="bottom: 15%; right: 15%; font-size: 30px;">1000</div>

        <!-- Régua Base -->
        <div class="bottom-axis">
            <div class="axis-mark" style="left: 10%;"></div>
            <div class="axis-mark" style="left: 50%;"></div>
            <div class="axis-mark" style="left: 90%;"></div>
            <div class="node-text" style="left: 10%; bottom: -30px; font-size: 24px;">🟊 VI</div>
        </div>
    </div>

    <!-- ABA 2: LOADOUT -->
    <div class="mm-tab-content" id="mm-tab-2">
        <div id="loadout-layout">
            <div id="loadout-left">
                <div class="pill-btn"><span class="pill-text">cuton</span> ➕</div>
                <div class="pill-btn locked">🔒 <span class="pill-lvl">L10</span></div>
                <div class="pill-btn locked">🔒 <span class="pill-lvl">L30</span></div>
                <div class="pill-btn locked">🔒</div>
            </div>
            <div id="loadout-right">
                <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;">
                    <!-- Seta da aba da lua pro slot 1 -->
                    <path d="M 120 100 Q 50 120, -100 120" fill="none" stroke="#fff" stroke-width="4" marker-end="url(#arrowhead)"/>
                    <!-- Seta curva Passiva e Ativa -->
                    <path d="M 450 350 Q 350 400, 320 200" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="5,5"/>
                    <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fff"/></marker></defs>
                </svg>
                
                <!-- Inventário Topo -->
                <div class="inv-node" style="top: 50px; left: 100px;">🌙</div>
                <div class="inv-node" style="top: 50px; left: 250px;">⚡<div class="inv-node-sm">Lv</div></div>
                <div class="node-text" style="top: 130px; left: 250px; color: #888;">Ativo</div>
                <div class="inv-node" style="top: 50px; left: 400px;"></div>

                <!-- Center Itens -->
                <div class="irregular-star" style="top: 250px; left: 150px;"></div>
                <div class="rounded-triangle" style="top: 300px; left: 450px;"></div>
                <div class="node-text" style="top: 250px; left: 520px; color: #888;">Passivo ↙</div>
            </div>
        </div>
    </div>

    <!-- ABA 3: MAPA (DEFAULT INICIAL) -->
    <div class="mm-tab-content active" id="mm-tab-3">
        <div id="dream-container">
            <!-- Área de Câmera (Pan e Zoom) -->
            <div id="map-viewport">
                <div id="fog-base"></div>
                <div id="fog-wisps"></div>
                <!-- Camada do Mapa Base -->
                <div id="map-layer"></div>
                <div id="fog-overlay"></div>
            </div>
            
            <button class="btn-close-map">X</button>
            <!-- Rosa dos Ventos do Wireframe -->
            <svg class="compass" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="none" stroke="#3e2723" stroke-width="3"/>
                <polygon points="50,0 60,40 100,50 60,60 50,100 40,60 0,50 40,40" fill="none" stroke="#3e2723" stroke-width="2"/>
                <text x="43" y="-5" fill="#3e2723" font-family="Georgia, serif" font-weight="bold">N</text><text x="45" y="115" fill="#3e2723" font-family="Georgia, serif" font-weight="bold">S</text>
                <text x="105" y="55" fill="#3e2723" font-family="Georgia, serif" font-weight="bold">L</text><text x="-15" y="55" fill="#3e2723" font-family="Georgia, serif" font-weight="bold">O</text>
            </svg>

            <button class="btn-teletrans" id="btn-sonhar">Sonhar</button>
            <div class="cloud-transition" id="cloud-transition"></div>
        </div>
    </div>

    <!-- ABA 4: STATS -->
    <div class="mm-tab-content" id="mm-tab-4">
        <div id="stats-layout">
            <h1 class="stats-title">Stats</h1>
            <div class="stat-line"><span class="sparkle">✦</span> DANO + 1.024%</div>
            <div class="stat-line"><span class="sparkle">✦</span> MAGIA + 9%</div>
            <div class="stats-divider"></div>
            <h2 class="upgrades-title">upgrades</h2>
        </div>
    </div>

    <div class="mm-tab-content" id="mm-tab-5">
        <div id="settings-layout" style="padding: 40px; text-align: center;">
            <h1 class="stats-title">Sistema</h1>
            <p style="color: #aaa; margin-bottom: 30px;">Gerencie o progresso dos seus sonhos e arquivos seguros.</p>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <button id="btn-export-save" class="btn-dream" style="font-size: 20px; padding: 15px 30px;">Exportar Save</button>
                <button id="btn-import-save" class="btn-dream" style="font-size: 20px; padding: 15px 30px;">Importar Save</button>
            </div>
            <textarea id="save-data-io" style="margin-top: 30px; width: 80%; height: 150px; background: #111; color: #55aaff; border: 2px solid #55aaff; padding: 10px; font-family: monospace; display: none;" placeholder="Cole seu código de save criptografado aqui..."></textarea>
            <br>
            <button id="btn-confirm-import" class="btn-dream" style="font-size: 16px; padding: 10px 20px; margin-top: 15px; display: none;">Confirmar Importação</button>
        </div>
    </div>

    <div id="mm-nav-bar">
        <button class="mm-nav-btn" data-target="mm-tab-1">Progression</button>
        <button class="mm-nav-btn" data-target="mm-tab-2">Loadout</button>
        <button class="mm-nav-btn active" data-target="mm-tab-3">World</button>
        <button class="mm-nav-btn" data-target="mm-tab-4">Stats</button>
        <button class="mm-nav-btn" data-target="mm-tab-5">System</button>
    </div>
</div>
