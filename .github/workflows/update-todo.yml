name: Update TODO from Issues

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

jobs:
  update-todo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Fetch issues and update TODO
        run: node -e "
          const fs = require('fs');
          const https = require('https');

          const repo = process.env.GITHUB_REPOSITORY;
          const token = process.env.GITHUB_TOKEN;

          const options = {
            hostname: 'api.github.com',
            path: '/repos/' + repo + '/issues',
            headers: {
              'User-Agent': 'GitHub-Actions',
              'Authorization': 'token ' + token
            }
          };

          https.get(options, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              const issues = JSON.parse(data);
              const existingContent = fs.existsSync('docs/todo.md') ? fs.readFileSync('docs/todo.md', 'utf8') : '';
              
              let issuesContent = '## Issues\\n\\n';
              issues.forEach(issue => {
                if (!issue.pull_request) {
                  let issueTodos = '';
                  const lines = (issue.body || '').split('\\n');
                  lines.forEach(line => {
                    if (line.trim().startsWith('- [ ]')) {
                      issueTodos += '    ' + line.trim() + '\\n';
                    }
                  });
                  issuesContent += '- [ ] ' + issue.title + ' (#' + issue.number + ')\\n    descrição: ' + (issue.body ? issue.body.split('\\n')[0] : 'No description.') + '\\n' + issueTodos + '\\n';
                }
              });
              
              const todoContent = '# TODO - Synced from GitHub Issues\\n\\n' + issuesContent + '\\n---\\n\\n' + existingContent;
              fs.writeFileSync('docs/todo.md', todoContent);
              console.log('TODO updated');
            });
          }).on('error', (err) => {
            console.error(err);
            process.exit(1);
          });
        "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain docs/todo.md)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/todo.md
          git commit -m "Update TODO from GitHub Issues"
          git push