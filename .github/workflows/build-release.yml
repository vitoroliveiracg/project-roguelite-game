name: "Build and Release"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Auto-increment Version
        shell: bash
        run: |
          NEW_VERSION="1.0.${{ github.run_number }}"
          node -e "const fs = require('fs'); const p = 'src-tauri/tauri.conf.json'; const d = JSON.parse(fs.readFileSync(p)); d.version = '$NEW_VERSION'; fs.writeFileSync(p, JSON.stringify(d, null, 2));"
          npm version $NEW_VERSION --no-git-tag-version

      - name: Download Ollama Sidecar Binaries
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            curl -L https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64 -o src-tauri/bin/ollama-x86_64-unknown-linux-gnu
            chmod +x src-tauri/bin/ollama-x86_64-unknown-linux-gnu
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            curl -L https://github.com/ollama/ollama/releases/latest/download/ollama-darwin -o src-tauri/bin/ollama-aarch64-apple-darwin
            chmod +x src-tauri/bin/ollama-aarch64-apple-darwin
          elif [ "${{ matrix.platform }}" = "windows-latest" ]; then
            curl -L https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip -o ollama.zip
            unzip ollama.zip -d src-tauri/bin/
            mv src-tauri/bin/ollama.exe src-tauri/bin/ollama-x86_64-pc-windows-msvc.exe
          fi

      - name: Generate Changelog from Commits
        id: changelog
        shell: bash
        run: |
          LATEST_RELEASE=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_RELEASE" ]; then
            COMMITS=$(git log --oneline --all)
          else
            COMMITS=$(git log --oneline $LATEST_RELEASE..HEAD)
          fi
          
          {
            echo "body<<EOF"
            echo "Nova versão do jogo gerada automaticamente para Windows, Mac e Linux!"
            echo ""
            echo "## Commits nesta versão:"
            echo "$COMMITS" | head -20
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'RPG Roguelite v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false