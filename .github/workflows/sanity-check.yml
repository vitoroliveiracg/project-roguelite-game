name: "Sanity Check (Fail-Fast CI)"

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  test-and-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Node moderno

      - name: Instalar dependências nativas (C++)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar dependências do Frontend
        run: npm install

      - name: Executar Sanity Check (TypeScript Domain)
        run: npm run test

      - name: Mock Sidecar Binaries (Para bypass rápido do Tauri Build Script)
        run: |
          mkdir -p src-tauri/bin
          touch src-tauri/bin/ollama

      - name: Executar Sanity Check Nativo (Rust AST)
        run: cargo check --manifest-path src-tauri/Cargo.toml